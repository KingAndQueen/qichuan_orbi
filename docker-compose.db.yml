version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: otf-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-orbitaskflow}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: otf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - ./redis-data:/data

  migrate:
    image: migrate/migrate:4
    container_name: otf-migrate
    entrypoint: ["/bin/sh", "-c"]
    # Example usage (run on demand):
    # docker compose -f docker-compose.db.yml run --rm migrate \
    #   "-path=/migrations -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable up"
    command: ["echo", "Use docker compose run --rm migrate '<cmd>' to run migrations."]
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
