# Nginx Configuration (Development)
# Nginx 配置（开发环境）
# This file is the Single Source of Truth (SSOT) for Nginx routing configuration.
# 此文件是 Nginx 路由配置的唯一事实来源（SSOT）。

# Upstream definitions
# 上游服务定义
upstream site_auth {
    server 127.0.0.1:8080;
}

upstream workspace_web {
    server 127.0.0.1:5174;
}

# Main server block
# 主服务器块
server {
    listen 9080;
    server_name localhost;

    # Disable server tokens
    # 禁用服务器标识
    server_tokens off;

    # Logging
    # 日志配置（使用项目统一日志目录）
    # Note: Actual path will be replaced by deployment script
    # 注意：实际路径将由部署脚本替换
    access_log logs/nginx/access.log;
    error_log logs/nginx/error.log;

    # CORS headers (applied globally, can be overridden per location)
    # CORS 头（全局应用，可按 location 覆盖）
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Workspace-Client' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Type' always;
    add_header 'Access-Control-Max-Age' '3600' always;

    # Internal location for JWT validation (used by auth_request)
    # JWT 验证内部端点（供 auth_request 使用）
    location = /_auth_validate {
        internal;
        proxy_pass http://site_auth/api/v1/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        # Forward Authorization header
        # 转发 Authorization 头
        proxy_set_header Authorization $http_authorization;
    }

    # Login endpoint (no authentication required)
    # 登录接口（无需鉴权）
    location /api/v1/login {
        add_header 'Access-Control-Allow-Origin' 'http://localhost:9080' always;
        
        proxy_pass http://site_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Session validation endpoint (requires JWT)
    # 会话验证接口（需要 JWT）
    location /api/v1/session {
        add_header 'Access-Control-Allow-Origin' 'http://localhost:9080' always;
        
        auth_request /_auth_validate;
        auth_request_set $auth_status $upstream_status;
        
        proxy_pass http://site_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logout endpoint (requires JWT)
    # 登出接口（需要 JWT）
    location /api/v1/logout {
        add_header 'Access-Control-Allow-Origin' 'http://localhost:9080' always;
        
        auth_request /_auth_validate;
        auth_request_set $auth_status $upstream_status;
        
        proxy_pass http://site_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket ticket endpoint (requires JWT)
    # WebSocket 凭证接口（需要 JWT）
    location /api/v1/agent/ws/tickets {
        add_header 'Access-Control-Allow-Origin' 'http://localhost:9080' always;
        
        auth_request /_auth_validate;
        auth_request_set $auth_status $upstream_status;
        
        proxy_pass http://site_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint (ticket validation handled by site-auth)
    # WebSocket 接口（凭证验证由 site-auth 处理）
    location /ws/agent {
        proxy_pass http://site_auth;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # [CRITICAL] Disable buffering for real-time Agent streaming
        # [关键] 关闭缓冲，确保 Agent 流式响应即时到达
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # [FIX] Next.js Hot Module Replacement (HMR)
    # [修复] Next.js 热更新 WebSocket 连接
    location /_next/webpack-hmr {
        proxy_pass http://workspace_web/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # [ADDED] Ensure Host header is passed correctly for strict origin checks
        # [新增] 确保 Host 头正确传递，满足严格的源检查
        proxy_set_header Host $host;
    }

    # Frontend static resources and API routes
    # (Including OPTIONS preflight handling)
    # 前端静态资源和 API 路由（包含 OPTIONS 预检请求处理）
    location / {
        # Handle OPTIONS preflight requests
        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:9080' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Workspace-Client' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Max-Age' '3600' always;
            add_header 'Content-Length' '0';
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        # Proxy to frontend
        # 代理到前端
        add_header 'Access-Control-Allow-Origin' 'http://localhost:9080' always;
        
        proxy_pass http://workspace_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # FIX: Use $http_host to match Next.js Server Actions 'Origin' header
        # 修复：使用 $http_host 来匹配 Next.js Server Actions 的 'Origin' 头部
        proxy_set_header X-Forwarded-Host $http_host;

        # [CRITICAL] Disable buffering for streaming responses (e.g. Server Actions)
        # [关键] 关闭缓冲，防止流式响应卡顿
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# End of configuration