[pytest]
# Pytest Configuration for Work-Agent
# Reference: docs/test/qa-master-plan.md

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = -v --tb=short

# Timeout for tests (in seconds)
# timeout = 60

# Markers
markers =
    infrastructure: marks tests as infrastructure tests (database, schema, etc.)
    slow: marks tests as slow-running
    requires_db: marks tests that require a database connection
    integration: marks tests as integration tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
